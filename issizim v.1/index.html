<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İŞSİZİM - Giriş Paneli</title>
    <link rel="stylesheet" href="style.css?v1.3.0">
    <script src="app.js"></script>
</head>
<body>

    <div id="modal-layer">
        <div class="modal-box">
            <h2>HOŞ GELDİNİZ</h2>
            <div class="version-badge">Sürüm: v1.3</div>
            <div class="vision-text">
                <strong>İŞSİZİM;</strong> kariyer platformlarının 
                yapay resmiyetini kıran, samimi bir 
                dayanışma ve veri meydanıdır.
            </div>
            
            <input type="text" id="reg-rumuz" placeholder="Sistem için bir rumuz yazın..." onkeydown="if(event.key === 'Enter') girisYap()">
            <button onclick="girisYap()" class="giris-btn">MEYDANA GİR</button>
        </div>
    </div>

    <div id="ana-ekran" style="display:none;"></div>

    <div id="lightbox-modal" class="lightbox" onclick="lightboxKapat()">
        <span class="lightbox-kapat">&times;</span>
        <img class="lightbox-icerik" id="lightbox-img">
    </div>
</body>
</html>
